# ROS1 configuration parameters
model_path: "models/cohere-transcribe-q4_k.gguf"
n_threads: 4
language: ""                 # ISO 639-1 language code (e.g. "ja", "en", or "" for auto)
audio_topic: "/audio"        # topic name for audio data
device_index: -1             # local microphone device index; -1 means default
ssh_host: ""                 # remote audio input host, e.g. hsr-user@192.168.0.1
ssh_compression: true        # pass -C to ssh
ssh_arecord_command: "arecord -q -f S16_LE -r 16000 -c 1 -t raw -"



# Silero VAD parameters
vad_model_path: "models/ggml-silero-v6.2.0.bin"
vad_threshold: 0.5         # Silero VAD threshold (0.0 - 1.0)
silence_duration: 0.8      # Silence timeout to confirm final result (seconds)

wav_path: "test_audio/sample.wav"
loop: true
chunk_duration: 0.1
