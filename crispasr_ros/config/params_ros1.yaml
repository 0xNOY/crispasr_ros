# ROS1 configuration parameters
model_path: "models/cohere-transcribe-q4_k.gguf"
n_threads: 4
language: "" # ISO 639-1 language code (e.g. "ja", "en", or "" for auto)
frequency_penalty: 0.4 # Repeated-token penalty for AR ASR backends; 0 disables it
enable_partial_results: false # GPSR only needs final ASR results; partial inference is expensive
max_audio_queue_chunks: 30 # 100 ms chunks by default, keeping roughly the latest 3 seconds
audio_topic: "/audio" # topic name for audio data
sample_rate: 16000 # published audio sample rate expected by ASR
audio_backend: "arecord" # local microphone backend: "arecord" or "sounddevice"
capture_sample_rate: 0 # microphone hardware rate; 0 tries 16k, then device/default rates
device_index: -1 # local microphone device index; -1 means default
arecord_command: "arecord -q -D default -f S16_LE -r 16000 -c 1 -t raw -"
ssh_host: "" # remote audio input host, e.g. hsr-user@192.168.0.1
ssh_compression: true # pass -C to ssh
ssh_arecord_command: "arecord -q -f S16_LE -r 16000 -c 1 -t raw -"

# Silero VAD parameters
vad_model_path: "models/ggml-silero-v6.2.0.bin"
vad_threshold: 0.7 # Silero VAD threshold (0.0 - 1.0)
silence_duration: 1.2 # Silence timeout to confirm final result (seconds)
phrase_time_limit: 30.0 # Maximum phrase duration after speech starts; <=0 disables it

# Wake-gated confirmation parameters
confirmation_result_topic: "/confirmation_result"
confirmation_wake_words: []
confirmation_positive_words:
  [
    "yes",
    "yeah",
    "yep",
    "ok",
    "okay",
    "ready",
    "done",
    "release",
    "はい",
    "うん",
    "レディ",
    "リリース",
  ]
confirmation_negative_words:
  ["no", "nope", "wrong", "incorrect", "not yet", "いいえ", "違う", "まだ"]
confirmation_wake_window_sec: 3.0
confirmation_require_wake_word: false

wav_path: "test_audio/sample.wav"
loop: true
chunk_duration: 0.1
