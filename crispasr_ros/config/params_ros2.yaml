# ROS2 configuration parameters
/**:
  ros__parameters:
    model_path: "models/cohere-transcribe-q4_k.gguf"
    n_threads: 4
    language: ""
    audio_topic: "/audio"
    sample_rate: 16000
    audio_backend: "arecord"
    capture_sample_rate: 0
    device_index: -1
    arecord_command: "arecord -q -D default -f S16_LE -r 16000 -c 1 -t raw -"
    ssh_host: ""
    ssh_compression: true
    ssh_arecord_command: "arecord -q -f S16_LE -r 16000 -c 1 -t raw -"

    # Silero VAD parameters
    vad_model_path: "models/ggml-silero-v6.2.0.bin"
    vad_threshold: 0.5
    silence_duration: 0.8
    phrase_time_limit: 0.0

    # Wake-gated confirmation parameters
    confirmation_result_topic: "/confirmation_result"
    confirmation_wake_words: ["eraser", "hey eraser", "イレーサー"]
    confirmation_positive_words: ["yes", "yeah", "yep", "ok", "okay", "ready", "done", "release", "はい", "うん", "レディ", "リリース"]
    confirmation_negative_words: ["no", "nope", "wrong", "incorrect", "not yet", "いいえ", "違う", "まだ"]
    confirmation_wake_window_sec: 3.0
    confirmation_require_wake_word: true
    
    wav_path: "test_audio/sample.wav"
    loop: true
    chunk_duration: 0.1
